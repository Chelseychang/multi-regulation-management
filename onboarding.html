<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Welcome to Onboard</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/onboarding-flow.css">

    <style>
        /* Vantage Markets inspired color scheme */
        :root {
            --vantage-primary: #F05742;
            --vantage-primary-dark: #D94632;
            --vantage-primary-light: #FF6B52;
            --vantage-secondary: #1A3A52;
            --vantage-accent: #FDB515;
            --vantage-dark: #0F1419;
            --vantage-gray: #4A5568;
            --vantage-light-gray: #EDF2F7;
        }

        body {
            background: linear-gradient(135deg, var(--vantage-secondary) 0%, #0F2537 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .onboarding-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .onboarding-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .progress-bar-wrapper {
            background: #f5f7fa;
            padding: 20px;
            border-bottom: 1px solid #e8eaed;
        }

        .content-wrapper {
            padding: 40px;
        }

        /* Toast styling */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
        }

        .toast {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success { border-left: 4px solid #10B981; }
        .toast-error { border-left: 4px solid var(--vantage-primary); }
        .toast-warning { border-left: 4px solid var(--vantage-accent); }
        .toast-info { border-left: 4px solid var(--vantage-secondary); }

        .toast-icon {
            font-size: 20px;
        }

        .toast-success .toast-icon { color: #10B981; }
        .toast-error .toast-icon { color: var(--vantage-primary); }
        .toast-warning .toast-icon { color: var(--vantage-accent); }
        .toast-info .toast-icon { color: var(--vantage-secondary); }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 14px;
            color: #2C3E50;
            margin-bottom: 4px;
        }

        .toast-message {
            font-size: 13px;
            color: #718096;
        }

        .toast-close {
            background: none;
            border: none;
            color: #718096;
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
        }

        .toast-close:hover {
            color: #2C3E50;
        }

        .onboarding-welcome-logo-text {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--vantage-primary) 0%, var(--vantage-primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            letter-spacing: -1px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="onboarding-wrapper">
        <div class="onboarding-container">
            <!-- Progress Bar -->
            <div class="progress-bar-wrapper">
                <div class="onboarding-stepper" id="onboardingStepper">
                    <!-- Steps will be dynamically rendered -->
                </div>
            </div>

            <!-- Content -->
            <div class="content-wrapper">
                <div class="onboarding-stage-container" id="onboardingStageContainer">
                    <!-- Stage content will be dynamically loaded here -->
                    <div class="onboarding-loading" id="loadingIndicator">
                        <div class="onboarding-spinner"></div>
                        <div style="color: #718096; font-size: 15px;">Loading...</div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="onboarding-navigation" id="onboardingNavigation" style="display: none;">
                    <div>
                        <button type="button" class="btn-onboarding-secondary" id="btnPrevious" style="display: none;">
                            <i class="fas fa-arrow-left"></i> Previous
                        </button>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button type="button" class="btn-skip" id="btnSkip" style="display: none;">
                            Skip for now
                        </button>
                        <button type="button" class="btn-onboarding-primary" id="btnNext">
                            Continue <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Stage Templates -->

    <!-- Registration Template -->
    <script type="text/template" id="template-stage-registration">
        <div class="onboarding-welcome">
            <h1 class="onboarding-welcome-title">Welcome to Onboard</h1>
            <p class="onboarding-welcome-subtitle">
                Let's get started with your account. This will only take a few minutes.
            </p>
        </div>

        <div class="stage-content" style="max-width: 500px; margin: 0 auto;">
            <form id="registrationForm">
                <!-- Domain Input -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Website Domain <span class="required">*</span>
                    </label>
                    <input type="text" class="onboarding-form-input" id="reg_domain"
                           placeholder="e.g., ows-trading.com" required>
                    <div class="onboarding-form-hint">
                        <i class="fas fa-info-circle"></i>
                        <span>Enter the website domain you're registering from</span>
                    </div>
                </div>

                <!-- Country of Residence -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Country of Residence <span class="required">*</span>
                    </label>
                    <select class="onboarding-form-input" id="reg_country" required>
                        <option value="">Select country...</option>
                    </select>
                </div>

                <!-- Nationality -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Nationality <span class="required">*</span>
                    </label>
                    <select class="onboarding-form-input" id="reg_nationality" required>
                        <option value="">Select nationality...</option>
                    </select>
                </div>

                <!-- Email -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Email Address <span class="required">*</span>
                    </label>
                    <input type="email" class="onboarding-form-input" id="reg_email"
                           placeholder="your.email@example.com" required>
                </div>

                <!-- Phone Number -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Phone Number <span class="required">*</span>
                    </label>
                    <input type="tel" class="onboarding-form-input" id="reg_phoneNumber"
                           placeholder="+1234567890" required>
                </div>

                <!-- Password -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Password <span class="required">*</span>
                    </label>
                    <input type="password" class="onboarding-form-input" id="reg_password"
                           placeholder="Create a strong password" required>
                    <div class="onboarding-form-hint">
                        <i class="fas fa-info-circle"></i>
                        <span>Minimum 8 characters, include numbers and symbols</span>
                    </div>
                </div>

                <!-- First Name (Optional) -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        First Name
                    </label>
                    <input type="text" class="onboarding-form-input" id="reg_firstName"
                           placeholder="Your first name">
                </div>

                <!-- Last Name (Optional) -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Last Name
                    </label>
                    <input type="text" class="onboarding-form-input" id="reg_lastName"
                           placeholder="Your last name">
                </div>

                <!-- Referred By (Optional) -->
                <div class="onboarding-form-group">
                    <label class="onboarding-form-label">
                        Referred By
                    </label>
                    <input type="text" class="onboarding-form-input" id="reg_referredBy"
                           placeholder="Referral code (optional)">
                </div>
            </form>
        </div>
    </script>

    <!-- Personal Details Template -->

    <!-- Questionnaire Template -->
    <script type="text/template" id="template-stage-questionnaire">

    <!-- jQuery -->

    <!-- Bootstrap JS -->

    <!-- Custom JS -->
    <script src="assets/js/data-service.js"></script>
    <script src="assets/js/kyc-system-service.js"></script>
    <script src="assets/js/onboarding-flow-client.js"></script>

    <script>
        // Global toast function
        window.showToast = function(message, type = 'info', title = '') {
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };

            const titles = {
                success: 'Success',
                error: 'Error',
                warning: 'Warning',
                info: 'Info'
            };

            const toastTitle = title || titles[type];
            const toastIcon = icons[type] || icons.info;

            const $toast = $(`
                <div class="toast toast-${type}">
                    <div class="toast-icon">
                        <i class="fas ${toastIcon}"></i>
                    </div>
                    <div class="toast-content">
                        <div class="toast-title">${toastTitle}</div>
                        <div class="toast-message">${message}</div>
                    </div>
                    <button class="toast-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `);

            $('#toastContainer').append($toast);

            // Auto dismiss after 5 seconds
            setTimeout(() => {
                $toast.fadeOut(300, function() {
                    $(this).remove();
                });
            }, 5000);

            // Manual close
            $toast.find('.toast-close').on('click', function() {
                $toast.fadeOut(300, function() {
                    $(this).remove();
                });
            });
        };

        // Initialize data service
        window.dataService = new DataService();

        // Initialize application when DOM is ready
        $(document).ready(async function() {
            console.log('🚀 Initializing Onboarding Flow');

            // Load master data
            try {
                await window.dataService.loadMasterData();
                console.log('✅ Master data loaded successfully');
            } catch (error) {
                console.error('❌ Failed to load master data:', error);
                showToast('Failed to load master data', 'error');
            }

            // Initialize onboarding service (same as embedded service in admin page)
            window.onboardingService = {
                storageKey: 'onboardingFlows',

                getConfig(brand, license) {
                    const allConfigs = this.loadAll();
                    return allConfigs.find(c => c.brand === brand && c.license === license);
                },

                loadAll() {
                    const data = localStorage.getItem(this.storageKey);
                    return data ? JSON.parse(data) : [];
                }
            };

            // Initialize onboarding flow
            await initOnboardingFlow();
        });

        async function initOnboardingFlow() {
            // Check if returning from external page
            const urlParams = new URLSearchParams(window.location.search);
            const completedStep = urlParams.get('completed');

            if (completedStep === 'personalInfo') {
                console.log('✅ Returned from external personal info page');
                showToast('Personal information saved successfully!', 'success');

                // Load session and move to next stage
                window.onboardingFlowClient.loadSession();
                if (window.onboardingFlowClient.currentStage === 2) {
                    // Mark personal details as completed and move to next stage
                    window.onboardingFlowClient.userData.personalInfoCompleted = true;
                    window.onboardingFlowClient.nextStage();
                    window.onboardingFlowClient.saveSession();
                }

                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // Continue normal initialization...
            // Load existing session if any
            const session = window.onboardingFlowClient.loadSession();

            if (session) {
                console.log('📥 Resuming from saved session');
                renderStepper();
                renderCurrentStage();
            } else {
                console.log('🆕 Starting new onboarding session');
                window.onboardingFlowClient.reset();
                renderStepper();
                renderCurrentStage();
            }

            // Bind navigation button events
            console.log('🔗 Binding button events...');
            const $btnNext = $('#btnNext');
            console.log('Next button found:', $btnNext.length, 'elements');

            $btnNext.on('click', function(e) {
                console.log('🔘 Click event triggered on Next button');
                e.preventDefault();
                handleNext();
            });

            $('#btnPrevious').on('click', handlePrevious);
            $('#btnSkip').on('click', handleSkip);

            // Hide loading indicator
            $('#loadingIndicator').hide();
            $('#onboardingNavigation').show();
            console.log('✅ Onboarding flow initialized');
        }

        function renderStepper() {
            const client = window.onboardingFlowClient;
            const $stepper = $('#onboardingStepper');
            $stepper.empty();

            // Hide stepper if complete
            if (client.currentStage === 'complete') {
                $stepper.hide();
                return;
            } else {
                $stepper.show();
            }

            client.stages.forEach((stage, index) => {
                const stageNumber = index + 1;
                const isCurrent = stageNumber === client.currentStage;
                const isCompleted = stageNumber < client.currentStage;
                const statusClass = isCompleted ? 'completed' : (isCurrent ? 'active' : '');

                const $step = $(`
                    <div class="stepper-step ${statusClass}">
                        <div class="stepper-circle">${isCompleted ? '' : stageNumber}</div>
                        <div class="stepper-label">${stage.name}</div>
                    </div>
                `);

                $stepper.append($step);
            });
        }

        async function renderCurrentStage() {
            const client = window.onboardingFlowClient;
            const $container = $('#onboardingStageContainer');

            // Handle completion stage
            if (client.currentStage === 'complete') {
                console.log('🎉 Rendering completion stage');
                $container.html(`
                    <div class="stage-content" style="text-align: center; padding: 80px 20px;">
                        <i class="fas fa-check-circle" style="font-size: 96px; color: #10B981; margin-bottom: 32px;"></i>
                        <h2 style="font-size: 32px; font-weight: 700; color: #2C3E50; margin-bottom: 16px;">
                            Onboarding Complete!
                        </h2>
                        <p style="font-size: 16px; color: #718096; margin-bottom: 40px;">
                            Thank you for completing your account setup. You can now start trading.
                        </p>
                        <button type="button" class="btn-onboarding-primary" style="font-size: 18px; padding: 16px 40px;">
                            <i class="fas fa-rocket"></i> Start Trading
                        </button>
                    </div>
                `);
                $('.onboarding-navigation').hide();
                return;
            }

            const stage = client.getCurrentStage();

            if (!stage) {
                console.error('❌ No current stage found');
                $container.html(`<div class="alert alert-danger">Invalid stage</div>`);
                return;
            }

            console.log('🎨 Rendering stage:', stage.name);

            // Get template
            const templateId = `template-stage-${stage.key}`;
            const template = $(`#${templateId}`).html();

            if (!template) {
                console.error('❌ Template not found:', templateId);
                $container.html(`<div class="alert alert-danger">Stage template not found</div>`);
                return;
            }

            // Render template
            $container.html(template);

            // Load stage-specific data
            await loadStageData(stage.key);

            // Update navigation buttons
            updateNavigationButtons();
        }

        async function loadStageData(stageKey) {
            switch (stageKey) {
                case 'registration':
                    await loadRegistrationData();
                    break;
                case 'personalDetails':
                    await loadPersonalDetailsData();
                    break;
                case 'tradingAccount':
                    await loadTradingAccountData();
                    break;
                case 'agreements':
                    await loadAgreementsData();
                    break;
                case 'questionnaire':
                    await loadQuestionnaireData();
                    break;
                case 'identityVerification':
                    await loadIdentityVerificationData();
                    break;
                default:
                    // Other stages use placeholder templates
                    break;
            }
        }

        async function loadIdentityVerificationData() {
            console.log('🆔 Loading Identity Verification configuration...');

            const client = window.onboardingFlowClient;
            const config = client.config;
            const kycConfig = config?.kycConfig || {};

            // Check if Individual Web Setting (H5 verification) is enabled for POI&POA
            const h5Verification = kycConfig.h5Verification;
            const hasH5Verification = h5Verification && h5Verification.enabled && h5Verification.route;

            console.log('H5 Verification config:', h5Verification);

            // Check if video verification was completed
            const videoVerificationComplete = sessionStorage.getItem('videoVerificationComplete') === 'true';

            let html = `
                <!-- POI Card -->
                <div class="onboarding-card" style="margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                        <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #3B82F6, #2563EB); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);">
                            <i class="fas fa-id-card" style="color: white; font-size: 20px;"></i>
                        </div>
                        <div style="flex: 1;">
                            <h3 style="margin: 0; font-size: 18px; font-weight: 600; color: #2C3E50;">
                                1. Proof of Identity (POI)
                            </h3>
                            <p style="margin: 4px 0 0 0; font-size: 13px; color: #718096;">
                                Verify your identity with an official document
                            </p>
                        </div>
                    </div>

        function setupOTPInputGroup($inputs, prefix) {
            // Auto-focus next input
            $inputs.on('input', function() {
                const $this = $(this);
                const value = $this.val();

                if (value.length === 1) {
                    $this.addClass('filled');
                    const $next = $this.next(`[id^="${prefix}_otp"]`);
                    if ($next.length) {
                        $next.focus();
                    }
                } else {
                    $this.removeClass('filled');
                }
            });

            // Backspace handling
            $inputs.on('keydown', function(e) {
                if (e.key === 'Backspace' && $(this).val() === '') {
                    const $prev = $(this).prev(`[id^="${prefix}_otp"]`);
                    if ($prev.length) {
                        $prev.focus().val('').removeClass('filled');
                    }
                }
            });

            // Paste handling
            $inputs.first().on('paste', function(e) {
                e.preventDefault();
                const pasteData = e.originalEvent.clipboardData.getData('text');
                const digits = pasteData.replace(/\D/g, '').split('').slice(0, 6);

                digits.forEach((digit, index) => {
                    $inputs.eq(index).val(digit).addClass('filled');
                });
            });
        }

        function maskEmail(email) {
            if (!email) return '';
            const [local, domain] = email.split('@');
            if (!domain) return email;

            const maskedLocal = local.length > 2
                ? local[0] + '*'.repeat(local.length - 2) + local[local.length - 1]
                : local;

            return `${maskedLocal}@${domain}`;
        }

        function maskPhone(phone) {
            if (!phone) return '';
            if (phone.length <= 4) return phone;

            return phone.substring(0, 3) + '****' + phone.substring(phone.length - 2);
        }

            switch (field.type) {

                case 'email':
                    return `<input type="email" class="onboarding-form-input" id="${fieldId}"
                                   name="${fieldKey}" value="${value}" ${required}>`;

                case 'phone':
                    return `<input type="tel" class="onboarding-form-input" id="${fieldId}"

                    return `<input type="date" class="onboarding-form-input" id="${fieldId}"

                    ).join('');
                    return `<select class="onboarding-form-input" id="${fieldId}"

                                   name="${fieldKey}" value="${value}" ${required}>`;

        function validateCurrentQuestionnairePage() {
            const state = window.questionnaireState;
            const config = state.config;
            const currentPage = state.currentSubPage;

            const questions = config.questions || [];
            const sourceFunds = config.sourceFunds || { enabled: false };
            const sourceWealth = config.sourceWealth || { enabled: false };

            // Determine current page type
            let pageIndex = 1;
            let currentPageType = null;

            if (questions.length > 0) {
                if (pageIndex === currentPage) {
                    currentPageType = 'questions';
                }
                pageIndex++;
            }
            if (sourceFunds.enabled) {
                if (pageIndex === currentPage) {
                    currentPageType = 'sourceFunds';
                }
                pageIndex++;
            }
            if (sourceWealth.enabled) {
                if (pageIndex === currentPage) {
                    currentPageType = 'sourceWealth';
                }
            }

            // Validate based on page type
            if (currentPageType === 'questions') {
                // Check if all required questions are answered
                const unansweredQuestions = [];
                questions.forEach((question, qIndex) => {
                    const inputName = `question_${qIndex}`;
                    const answered = $(`input[name="${inputName}"]:checked`).length > 0;
                    if (!answered) {
                        unansweredQuestions.push(qIndex + 1);
                    }
                });

                if (unansweredQuestions.length > 0) {
                    showToast(`Please answer question(s): ${unansweredQuestions.join(', ')}`, 'error');
                    return false;
                }
            } else if (currentPageType === 'sourceFunds') {
                // Check if at least one source of funds is selected
                const selected = $('input[name="source_funds"]:checked').length > 0;
                if (!selected) {
                    showToast('Please select at least one source of funds', 'error');
                    return false;
                }
            } else if (currentPageType === 'sourceWealth') {
                // Check if at least one source of wealth is selected
                const selected = $('input[name="source_wealth"]:checked').length > 0;
                if (!selected) {
                    showToast('Please select at least one source of wealth', 'error');
                    return false;
                }
            }

            return true;
        }

                        });
                    });
                } else if (currentPageType === 'sourceFunds') {
                    const savedFunds = state.answers.sourceFunds || [];
                    savedFunds.forEach(value => {
                        $(`input[name="source_funds"][value="${value}"]`).prop('checked', true);
                    });
                } else if (currentPageType === 'sourceWealth') {
                    const savedWealth = state.answers.sourceWealth || [];
                    savedWealth.forEach(value => {
                        $(`input[name="source_wealth"][value="${value}"]`).prop('checked', true);
                    });
                }
            }, 100);
        }

        function renderQuestion(question, qIndex) {
            const isSingleChoice = question.type === 'single_choice';
            const inputType = isSingleChoice ? 'radio' : 'checkbox';
            const inputName = `question_${qIndex}`;

            console.log(`[renderQuestion] Question ${qIndex}:`, question);

            let html = `
                <div class="onboarding-card" style="margin-bottom: 24px;">
                    <h3 style="font-size: 16px; font-weight: 600; color: #2C3E50; margin-bottom: 16px;">
                        ${qIndex + 1}. ${question.question}
                    </h3>
            `;

            // Render options
            question.options.forEach((option, optIndex) => {
                console.log(`[renderQuestion] Option ${optIndex}:`, option);

                const optionKey = option.key || option.text || option;
                const optionText = option.text || option;
                const optionId = `${inputName}_${optIndex}`;
                // Check for popup - the config uses popupTitle/popupContent fields
                const hasPopup = option.hasPopup && (option.popupTitle || option.popupContent);

                console.log(`[renderQuestion] Option ${optIndex} hasPopup:`, hasPopup, 'hasPopup flag:', option.hasPopup, 'title:', option.popupTitle);

                html += `
                    <div class="form-check" style="margin-bottom: 12px;">
                        <input class="form-check-input"
                               type="${inputType}"
                               name="${inputName}"
                               id="${optionId}"
                               value="${optionKey}"
                               data-question-index="${qIndex}"
                               data-option-index="${optIndex}"
                               ${hasPopup ? `data-has-popup="true"` : ''}
                               onchange="handleQuestionOptionChange(${qIndex}, ${optIndex})">
                        <label class="form-check-label" for="${optionId}" style="font-size: 14px; color: #2C3E50;">
                            ${optionText}
                            ${hasPopup ? '<i class="fas fa-info-circle" style="color: #3B82F6; margin-left: 4px;" title="This option will show additional information"></i>' : ''}
                        </label>
                    </div>
                `;

                // If option requires input, add text field
                if (option.requiresInput) {
                    html += `
                        <div id="input_${optionId}" style="display: none; margin-left: 32px; margin-bottom: 12px;">
                            <input type="text"
                                   class="form-control"
                                   placeholder="Please specify..."
                                   style="font-size: 13px; max-width: 400px;">
                        </div>
                    `;
                }
            });

            html += `</div>`;
            return html;
        }

        // Helper function to escape HTML for data attributes
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/"/g, '&quot;');
        }

        function renderSourceOfFunds(sourceFunds) {
            const question = sourceFunds.question || 'Please indicate the origin of the funds you will use for your account deposits.';
            const options = sourceFunds.options || [];
            const isSingleChoice = sourceFunds.selectionType === 'single';
            const inputType = isSingleChoice ? 'radio' : 'checkbox';
            const requireUpload = sourceFunds.requireUpload || false;

            let html = `
                <div class="onboarding-card" style="margin-bottom: 24px; border: 2px solid #3B82F6;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                        <i class="fas fa-coins" style="color: #3B82F6; font-size: 20px;"></i>
                        <h3 style="font-size: 16px; font-weight: 600; color: #2C3E50; margin: 0;">
                            Source of Funds
                        </h3>
                    </div>
                    <p style="font-size: 14px; color: #718096; margin-bottom: 16px;">${question}</p>
            `;

            options.forEach((option, optIndex) => {
                const optionId = `source_funds_${optIndex}`;
                html += `
                    <div class="form-check" style="margin-bottom: 12px;">
                        <input class="form-check-input"
                               type="${inputType}"
                               name="source_funds"
                               id="${optionId}"
                               value="${option}">
                        <label class="form-check-label" for="${optionId}" style="font-size: 14px; color: #2C3E50;">

                        <h4 style="font-size: 14px; font-weight: 600; color: #2C3E50; margin-bottom: 12px;">
                            <i class="fas fa-upload"></i> Upload Supporting Documents

        function renderSourceOfWealth(sourceWealth) {

        function handleQuestionOptionChange(qIndex, optIndex) {
            const client = window.onboardingFlowClient;
            const config = client.config;
            const questionnaireConfig = config?.questionnaireConfig || {};
            const question = questionnaireConfig.questions[qIndex];
            const option = question.options[optIndex];

            const inputId = `question_${qIndex}_${optIndex}`;
            const $input = $(`#${inputId}`);
            const isChecked = $input.is(':checked');

            // Show/hide text input if option requires input
            if (option.requiresInput) {
                const $textInput = $(`#input_${inputId}`);
                if (isChecked) {
                    $textInput.slideDown(200);
                } else {
                    $textInput.slideUp(200);
                }
            }

            // Show popup if option has popup configured
            if (isChecked && option.hasPopup) {
                console.log('[handleQuestionOptionChange] Showing popup for option:', option);
                showQuestionnairePopup(option.popupTitle, option.popupContent);
            }
        }

        // Show questionnaire option popup
        function showQuestionnairePopup(title, content) {
            console.log('[showQuestionnairePopup] Title:', title, 'Content:', content);
            $('#popupModalTitle').text(title || 'Important Notice');
            $('#popupModalContent').html(content || '');

            const modal = new bootstrap.Modal(document.getElementById('questionnairePopupModal'));
            modal.show();
        }

        function submitQuestionnaire() {
            console.log('📤 Submitting questionnaire...');

            // Validate and save current page first
            if (!validateCurrentQuestionnairePage()) {
                return;
            }
            saveCurrentQuestionnaireAnswers();

            const client = window.onboardingFlowClient;
            const state = window.questionnaireState;
            const config = state.config;
            const questions = config.questions || [];
            const sourceFunds = config.sourceFunds || { enabled: false };
            const sourceWealth = config.sourceWealth || { enabled: false };

            // Collect all answers from saved state
            const answers = [];

            // Collect regular question answers
            questions.forEach((question, qIndex) => {
                const selectedValues = state.answers.questions[qIndex] || [];

                if (selectedValues.length > 0) {
                    answers.push({
                        questionKey: question.key || `q_${qIndex}`,
                        question: question.question,
                        selectedOptions: selectedValues
                    });
                }
            });

            // Collect Source of Funds answers
            if (sourceFunds.enabled && state.answers.sourceFunds.length > 0) {
                answers.push({
                    questionKey: 'source_of_funds',
                    question: sourceFunds.question,
                    selectedOptions: state.answers.sourceFunds
                });
            }

            // Collect Source of Wealth answers
            if (sourceWealth.enabled && state.answers.sourceWealth.length > 0) {
                answers.push({
                    questionKey: 'source_of_wealth',
                    question: sourceWealth.question,
                    selectedOptions: state.answers.sourceWealth
                });
            }

            console.log('Questionnaire Answers:', answers);

            // Save to session
            client.userData.questionnaire = {
                answers: answers,
                completedAt: new Date().toISOString()
            };
            client.saveSession();

            showToast('Questionnaire submitted successfully!', 'success');

            // Clear questionnaire state
            window.questionnaireState = {
                currentSubPage: 1,
                totalSubPages: 0,
                config: null,
                answers: {
                    questions: {},
                    sourceFunds: [],
                    sourceWealth: []
                }
            };

            // Move to next stage
            setTimeout(() => {
                client.nextStage();
                renderStepper();
                renderCurrentStage();
            }, 1000);
        }

        // ========== End Questionnaire Functions ==========

        // Load External Questionnaire Page (H5 Verification)
        function loadExternalQuestionnairePage(h5Config) {
            const route = h5Config.route || '/kyc-bank-verification.html';
            const sessionToken = Date.now();

            // Save current session before loading iframe
            window.onboardingFlowClient.saveSession();

            // Build iframe URL
            const iframeUrl = `${route}?session=${sessionToken}&embedded=true`;

            console.log('🔗 Loading external questionnaire page in iframe:', iframeUrl);

            // Embed the external page in an iframe
            $('#stageContainer').html(`
                <div class="stage-content">
                    <div class="external-iframe-container">
                        <div class="external-iframe-header">
                            <div class="badge badge-primary" style="background: #667eea; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; display: inline-block; margin-bottom: 16px;">
                                <i class="fas fa-external-link-alt"></i> External Questionnaire Page
                            </div>
                            <p style="color: #718096; font-size: 14px; margin-bottom: 20px;">
                                Please complete the questionnaire below.
                            </p>
                        </div>
                        <iframe
                            id="externalQuestionnaireFrame"
                            src="${iframeUrl}"
                            style="width: 100%; height: 800px; border: 2px solid #E8EAED; border-radius: 12px; background: white;"
                            frameborder="0"
                            scrolling="auto">
                        </iframe>
                    </div>
                </div>
            `);

            // Mark that we're using external questionnaire page
            window.onboardingFlowClient.userData.usingExternalQuestionnaire = true;

            // Listen for messages from iframe
            window.addEventListener('message', handleQuestionnaireIframeMessage);
        }

        function handleQuestionnaireIframeMessage(event) {
            const message = event.data;

            if (message.type === 'questionnaireCompleted') {
                console.log('✅ Questionnaire completed in iframe');

                // Update session with data from iframe
                window.onboardingFlowClient.userData.questionnaire = {
                    completedAt: new Date().toISOString(),
                    data: message.data
                };
                window.onboardingFlowClient.saveSession();

                showToast('Questionnaire completed successfully!', 'success');

                // Automatically move to next stage
                setTimeout(() => {
                    window.onboardingFlowClient.nextStage();
                    renderStepper();
                    renderCurrentStage();
                }, 1000);
            }
        }

        async function loadRegistrationData() {
            // Get countries and nationalities
            const countries = window.dataService.getCountries();
            const nationalities = window.dataService.getNationalities();

            console.log('Countries:', countries);
            console.log('Nationalities:', nationalities);

            // Populate country dropdown
            const $countrySelect = $('#reg_country');
            countries.forEach(country => {
                // Handle both object format {code, name} and string format
                const countryName = typeof country === 'string' ? country : country.name;
                const countryValue = typeof country === 'string' ? country : country.name;
                $countrySelect.append(`<option value="${countryValue}">${countryName}</option>`);
            });

            // Populate nationality dropdown
            const $nationalitySelect = $('#reg_nationality');
            nationalities.forEach(nationality => {
                // Handle both object format {code, name} and string format
                const nationalityName = typeof nationality === 'string' ? nationality : nationality.name;
                const nationalityValue = typeof nationality === 'string' ? nationality : nationality.name;
                $nationalitySelect.append(`<option value="${nationalityValue}">${nationalityName}</option>`);
            });

            // Pre-fill from session if available
            const userData = window.onboardingFlowClient.userData;
            if (userData.email) $('#reg_email').val(userData.email);
            if (userData.country) $('#reg_country').val(userData.country);
            if (userData.nationality) $('#reg_nationality').val(userData.nationality);
            if (userData.domain) $('#reg_domain').val(userData.domain);
            if (userData.phoneNumber) $('#reg_phoneNumber').val(userData.phoneNumber);
            if (userData.firstName) $('#reg_firstName').val(userData.firstName);
            if (userData.lastName) $('#reg_lastName').val(userData.lastName);
            if (userData.referredBy) $('#reg_referredBy').val(userData.referredBy);
        }

        function updateNavigationButtons() {
            const client = window.onboardingFlowClient;
            const stage = client.getCurrentStage();

            // Show/hide Previous button
            if (client.currentStage > 1) {
                $('#btnPrevious').show();
            } else {
                $('#btnPrevious').hide();
            }

            // Show/hide Skip button (for optional stages)
            const optionalStages = ['identityVerification', 'kycProgress'];
            if (optionalStages.includes(stage.key)) {
                $('#btnSkip').show();
            } else {
                $('#btnSkip').hide();
            }

            // Update Next button text
            if (client.currentStage === client.totalStages) {
                $('#btnNext').html('<i class="fas fa-check"></i> Complete');
            } else {
                $('#btnNext').html('Continue <i class="fas fa-arrow-right"></i>');
            }
        }

        async function handleNext() {
            try {
                console.log('🔘 Next button clicked!');
                const client = window.onboardingFlowClient;

                if (!client) {
                    console.error('❌ onboardingFlowClient not found');
                    showToast('System error: Client not initialized', 'error');
                    return;
                }

                const stage = client.getCurrentStage();
                console.log('➡️ Current stage:', stage);

                // Stage-specific completion
                if (stage.key === 'registration') {
                    console.log('📝 Completing registration...');
                    const success = await completeRegistration();
                    console.log('Registration result:', success);
                    if (!success) return;
                } else if (stage.key === 'personalDetails') {
                    console.log('📝 Completing personal details...');

                    // Check if using external form in iframe
                    if (client.userData.usingExternalPersonalInfo) {
                        console.log('🔗 Triggering external form submission...');
                        const submitted = submitExternalPersonalInfoForm();
                        if (submitted) {
                            // Form submission triggered, iframe will send message when complete
                            // handleIframeMessage will handle moving to next stage
                            return;
                        } else {
                            showToast('Error: External form not available', 'error');
                            return;
                        }
                    }

                    const success = completePersonalDetails();
                    if (!success) return;
                } else if (stage.key === 'tradingAccount') {
                    console.log('📝 Completing trading account...');
                    const success = completeTradingAccount();
                    if (!success) return;
                } else if (stage.key === 'agreements') {
                    console.log('📝 Completing agreements...');
                    const success = completeAgreements();
                    if (!success) return;
                }

                // Move to next stage
                console.log('⏭️ Moving to next stage...');
                client.nextStage();
                renderStepper();
                renderCurrentStage();
            } catch (error) {
                console.error('❌ Error in handleNext:', error);
                showToast('An error occurred: ' + error.message, 'error');
            }
        }

        function handlePrevious() {
            window.onboardingFlowClient.previousStage();
            renderStepper();
            renderCurrentStage();
        }

        function handleSkip() {
            const client = window.onboardingFlowClient;
            const stage = client.getCurrentStage();

            console.log('⏭️ Skipping stage:', stage.name);
            showToast(`Skipped ${stage.name}. You can complete this later.`, 'info');

            client.nextStage();
            renderStepper();
            renderCurrentStage();
        }

        async function completeRegistration() {
            try {
                console.log('📋 Starting registration validation...');

                const email = $('#reg_email').val().trim();
                const password = $('#reg_password').val();
                const country = $('#reg_country').val();
                const nationality = $('#reg_nationality').val();
                const domain = $('#reg_domain').val().trim();
                const phoneNumber = $('#reg_phoneNumber').val().trim();

                // Optional fields
                const firstName = $('#reg_firstName').val()?.trim() || '';
                const lastName = $('#reg_lastName').val()?.trim() || '';
                const referredBy = $('#reg_referredBy').val()?.trim() || '';

                console.log('Form values:', {
                    email, password: '***', country, nationality, domain,
                    phoneNumber, firstName, lastName, referredBy
                });

                // Basic validation - check all required fields
                if (!email || !password || !country || !nationality || !domain || !phoneNumber) {
                    showToast('Please fill in all required fields', 'error');
                    return false;
                }

                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showToast('Please enter a valid email address', 'error');
                    return false;
                }

                // Password validation
                if (password.length < 8) {
                    showToast('Password must be at least 8 characters long', 'error');
                    return false;
                }

                // Determine license
                showToast('Determining your regulation...', 'info');
                console.log('🔍 Determining license for:', { country, nationality, domain });

                // Check what regulations exist
                const allRegulations = window.dataService.getAllRegulations();
                console.log('📋 Available regulations:', allRegulations.length);
                console.log('📋 Raw regulations data:', allRegulations);

                if (allRegulations.length === 0) {
                    console.warn('⚠️ No regulations found in system!');
                    showToast('No regulations configured. Please contact administrator.', 'error');
                    return false;
                }

                console.log('Regulations summary:', allRegulations.map(r => ({
                    brand: r.brand,
                    license: r.licenseCode || r.code,
                    regulation: r.regulation,
                    registrationFields: r.registrationFields
                })));

                const result = await window.onboardingFlowClient.determineLicense(country, nationality, domain);
                console.log('License determination result:', result);

                if (!result.matched) {
                    console.warn('⚠️ No matching regulation found');
                    console.log('💡 Using fallback for testing...');

                    // For testing: create a mock result
                    showToast('No matching regulation found. Using test mode.', 'warning');

                    window.onboardingFlowClient.brand = 'TEST_BRAND';
                    window.onboardingFlowClient.license = 'TEST_LICENSE';
                    window.onboardingFlowClient.config = window.onboardingFlowClient.getDefaultConfig();

                    // Save user data
                    window.onboardingFlowClient.userData = {
                        email,
                        country,
                        nationality,
                        domain,
                        phoneNumber,
                        firstName,
                        lastName,
                        referredBy,
                        createdAt: new Date().toISOString()
                    };

                    window.onboardingFlowClient.saveSession();

                    showToast('Test mode: Proceeding without regulation match', 'info');
                    return true;
                }

                // Save license and brand
                console.log('💾 Saving brand and license...');
                window.onboardingFlowClient.brand = result.brand;
                window.onboardingFlowClient.license = result.license;

                // Load configuration
                console.log('📥 Loading configuration...');
                await window.onboardingFlowClient.loadConfig();

                // Save user data (including dynamic registration fields)
                window.onboardingFlowClient.userData = {
                    email,
                    country,
                    nationality,
                    domain,
                    phoneNumber,
                    firstName,
                    lastName,
                    referredBy,
                    createdAt: new Date().toISOString()
                };

                window.onboardingFlowClient.saveSession();
                console.log('✅ Session saved');

                showToast(`Successfully matched to ${result.brand} - ${result.license}`, 'success');

                return true;
            } catch (error) {
                console.error('❌ Error in completeRegistration:', error);
                showToast('Registration error: ' + error.message, 'error');
                return false;
            }
        }
    </script>
