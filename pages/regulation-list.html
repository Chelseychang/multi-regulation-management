<!-- Regulation List Page -->
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-list"></i> Regulation List
    </h1>
    <p class="page-description">
        View and manage all regulation rules
    </p>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">All Regulations</h5>
        <a href="#/regulation/create" class="btn btn-primary">
            <i class="fas fa-plus"></i> Create New Regulation
        </a>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table id="regulationTable" class="table table-hover" style="width:100%">
                <thead>
                    <tr>
                        <th>Regulation</th>
                        <th>Code</th>
                        <th>Description</th>
                        <th>Registration Type</th>
                        <th>Created Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be populated by DataTables -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Initialize DataTable when page loads
$(document).one('pageLoaded', function(event, data) {
    if (data.route === '#/regulation/list') {
        initRegulationList();
    }
});

function initRegulationList() {
    const dataService = new DataService();
    const regulations = dataService.getAllRegulations();

    // Initialize DataTable
    const table = $('#regulationTable').DataTable({
        data: regulations,
        columns: [
            {
                data: 'regulation',
                render: function(data) {
                    const badges = {
                        'V1': 'badge-primary',
                        'V2': 'badge-info',
                        'ASIC': 'badge-success',
                        'FCA': 'badge-warning'
                    };
                    const badgeClass = badges[data] || 'badge-secondary';
                    return `<span class="badge ${badgeClass}">${data}</span>`;
                }
            },
            {
                data: 'code',
                render: function(data) {
                    return `<strong>${data}</strong>`;
                }
            },
            {
                data: 'description'
            },
            {
                data: 'registrationTypes',
                render: function(data) {
                    return Array.isArray(data) ? data.join(', ') : '';
                }
            },
            {
                data: 'createdAt',
                render: function(data) {
                    return data ? new Date(data).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    }) : '-';
                }
            },
            {
                data: null,
                orderable: false,
                render: function(data, type, row) {
                    return `
                        <div class="btn-group gap-1">
                            <a href="#/regulation/edit/${row.id}" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-edit"></i> Edit
                            </a>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteRegulation(${row.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    `;
                }
            }
        ],
        order: [[4, 'desc']], // Sort by created date descending
        pageLength: 25,
        lengthMenu: [[10, 25, 50, 100], [10, 25, 50, 100]],
        responsive: true,
        language: {
            search: 'Search:',
            lengthMenu: 'Show _MENU_ entries',
            info: 'Showing _START_ to _END_ of _TOTAL_ entries',
            infoEmpty: 'No regulations found',
            infoFiltered: '(filtered from _MAX_ total entries)',
            zeroRecords: 'No matching regulations found',
            emptyTable: 'No regulations available. Click "Create New Regulation" to get started.',
            paginate: {
                first: 'First',
                last: 'Last',
                next: 'Next',
                previous: 'Previous'
            }
        }
    });

    console.log('✅ Regulation list initialized with', regulations.length, 'records');
}

// Global delete function
window.deleteRegulation = function(id) {
    if (confirm('Are you sure you want to delete this regulation? This action cannot be undone.')) {
        try {
            const dataService = new DataService();
            dataService.deleteRegulation(id);

            // Refresh the DataTable
            $('#regulationTable').DataTable().destroy();
            initRegulationList();

            // Show success toast
            if (window.showToast) {
                window.showToast('Regulation deleted successfully', 'success');
            } else {
                alert('✅ Regulation deleted successfully');
            }
        } catch (error) {
            console.error('Error deleting regulation:', error);

            // Show error toast
            if (window.showToast) {
                window.showToast('Failed to delete regulation', 'error');
            } else {
                alert('❌ Failed to delete regulation');
            }
        }
    }
};
</script>
